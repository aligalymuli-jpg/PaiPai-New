<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Управление | Pai Pai</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Marck+Script&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <style>
        body { min-height: 100vh; padding: 20px 16px 60px; }

        /* ── ВСЕ ЭКРАНЫ СКРЫТЫ ПО УМОЛЧАНИЮ ──────────────────────
           Показываем только нужный через JS после проверки Auth.
           Это предотвращает мигание/утечку UI до получения токена.
           ──────────────────────────────────────────────────────── */
        #screen-check,
        #screen-login,
        #screen-denied,
        #screen-admin  { display: none; }

        /* ── ЭКРАН ПРОВЕРКИ СЕССИИ ──────────────────────────────── */
        #screen-check {
            min-height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            text-align: center;
        }
        .check-spinner {
            width: 44px; height: 44px;
            border: 3px solid rgba(196,140,93,.12);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin .85s linear infinite;
        }
        .check-text { font-size:.76rem; opacity:.38; letter-spacing:2.5px; text-transform:uppercase; }

        /* ── ЭКРАН ЛОГИНА ────────────────────────────────────────── */
        #screen-login {
            min-height: 100vh;
            align-items: center;
            justify-content: center;
        }

        /* Кнопка Google (официальный стиль) */
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #fff;
            color: #3c4043;
            border: 1px solid #dadce0;
            border-radius: 14px;
            padding: 14px 28px;
            font-size: .95rem;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
            width: 100%;
            transition: background .18s, box-shadow .18s, transform .14s;
            letter-spacing: .2px;
        }
        .google-btn:hover {
            background: #f8f9fa;
            box-shadow: 0 2px 12px rgba(0,0,0,.18);
        }
        .google-btn:active { transform: scale(.97); }
        .google-btn svg { flex-shrink: 0; }

        /* ── ЭКРАН "ДОСТУП ЗАПРЕЩЁН" ─────────────────────────────── */
        #screen-denied {
            min-height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            gap: 16px;
        }
        .denied-icon { font-size: 3.5rem; color: #e74c3c; }
        .denied-title { font-size: 1.4rem; font-weight: 700; color: #e74c3c; }
        .denied-email {
            font-size: .80rem; opacity: .50;
            background: rgba(231,76,60,.08);
            border: 1px solid rgba(231,76,60,.20);
            padding: 8px 16px; border-radius: 8px;
        }
        .denied-logout {
            margin-top: 8px;
            background: none; border: 1px solid rgba(255,255,255,.18);
            color: rgba(237,233,224,.65); padding: 11px 24px;
            border-radius: 12px; cursor: pointer; font-size: .84rem;
            font-family: 'Montserrat', sans-serif;
            transition: border-color .2s, color .2s;
        }
        .denied-logout:hover { border-color: rgba(255,255,255,.35); color: #ede9e0; }
    </style>
</head>
<body>

<!-- ════════════════════════════════════════════════════════════
     ЭКРАН 1: Проверка сессии (~200мс при загрузке)
     ════════════════════════════════════════════════════════ -->
<div id="screen-check">
    <div class="check-spinner"></div>
    <p class="check-text">Проверка сессии...</p>
</div>

<!-- ════════════════════════════════════════════════════════════
     ЭКРАН 2: Вход через Google
     ════════════════════════════════════════════════════════ -->
<div id="screen-login">
    <div class="admin-box" style="max-width:380px; text-align:center;">
        <div class="admin-title">Pai Pai Admin</div>
        <p style="opacity:.44; font-size:.84rem; margin-bottom:26px; line-height:1.6;">
            Войдите с помощью своего аккаунта Google.<br>
            Доступ разрешён только владельцу.
        </p>

        <button class="google-btn" onclick="signInWithGoogle()" id="google-sign-in-btn">
            <!-- Официальная иконка Google -->
            <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Войти через Google
        </button>

        <p id="login-error" style="color:#e74c3c; font-size:.78rem; margin-top:14px; min-height:1.2em;"></p>
    </div>
</div>

<!-- ════════════════════════════════════════════════════════════
     ЭКРАН 3: Доступ запрещён (чужой Google-аккаунт)
     ════════════════════════════════════════════════════════ -->
<div id="screen-denied">
    <i class="fas fa-shield-alt denied-icon"></i>
    <div class="denied-title">Доступ запрещён</div>
    <p style="opacity:.55; font-size:.88rem; max-width:300px; line-height:1.6;">
        Этот аккаунт Google не является владельцем панели управления.
    </p>
    <div class="denied-email" id="denied-email-info"></div>
    <button class="denied-logout" onclick="signOut()">

     ЭКРАН 4: Панель управления (только авторизованный владелец)

        <!-- ФОРМА ДОБАВЛЕНИЯ / РЕДАКТИРОВАНИЯ -->

<!-- ════════════════════════════════════════════════════════════
     FIREBASE CDN v8 — добавляем firebase-auth (уже есть) и
     обязательно подключаем firebase-auth для Google Provider
     ════════════════════════════════════════════════════════ -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="js/config.js"></script>

<script>
'use strict';

/* ════════════════════════════════════════════════════════════
   ⚠️  ВАЖНО: ЗАМЕНИ НА СВОИ ДАННЫЕ  ⚠️

   ALLOWED_UIDS — массив UID Google-аккаунтов, которым
   разрешён доступ. Можно добавить несколько.

   КАК НАЙТИ UID:
   1. Открой Firebase Console → Authentication → Users
   2. Войди на этой странице через Google (кнопка ниже)
   3. В таблице появится строка — скопируй User UID
   4. Вставь вместо 'ЗАМЕНИ_НА_ТВОЙ_GOOGLE_UID'

   ALLOWED_EMAILS — дополнительная проверка по email
   (защита от ошибки при вводе UID).
   ════════════════════════════════════════════════════════ */
const ALLOWED_UIDS   = [
    'fa2UQBrP8Ka2eyMupvXCR9xHv6A2',           // твой основной аккаунт
    // 'UID_ВТОРОГО_АДМИНИСТРАТОРА',       // второй аккаунт если нужен
];

const ALLOWED_EMAILS = [
    'aligalymuli@gmail.com',                // твой Gmail
    // 'второй_email@gmail.com',
];

const IMGBB_KEY  = '19b2ea0cacae4c9328806e4c678db140';

/* ────────────────────────────────────────────────────────────
   Дополнительные переменные состояния
   ──────────────────────────────────────────────────────── */
let editId         = null;
let currentImgUrl  = null;   // URL фото при редактировании
let dbListenerRef  = null;

/* ════════════════════════════════════════════════════════════
   ФУНКЦИИ ПЕРЕКЛЮЧЕНИЯ ЭКРАНОВ
   ════════════════════════════════════════════════════════ */
function showScreen(name) {
    ['check','login','denied','admin'].forEach(s => {
        const el = document.getElementById('screen-' + s);
        if (el) el.style.display = 'none';
    });
    const target = document.getElementById('screen-' + name);
    if (target) target.style.display = (name === 'check' || name === 'denied') ? 'flex' : (name === 'login' ? 'flex' : 'block');
}

/* ════════════════════════════════════════════════════════════
   ИНИЦИАЛИЗАЦИЯ АВТОРИЗАЦИИ

   Архитектура защиты:
   1. SESSION persistence — сессия живёт только пока открыта вкладка
   2. onAuthStateChanged — единственная точка показа UI
   3. Двойная проверка: UID + Email — если оба не совпали, доступ закрыт
   4. Немедленный signOut при несанкционированном входе
   ════════════════════════════════════════════════════════ */
showScreen('check');

firebase.auth()
    .setPersistence(firebase.auth.Auth.Persistence.SESSION)
    .then(() => {
        firebase.auth().onAuthStateChanged(user => {
            if (!user) {
                /* Пользователь не вошёл */
                showScreen('login');
                return;
            }

            /* Двойная проверка: UID И email должны быть в whitelist */
            const uidOk   = ALLOWED_UIDS.includes(user.uid);
            const emailOk = ALLOWED_EMAILS.includes(user.email);

            if (uidOk && emailOk) {
                /* Доступ разрешён */
                showScreen('admin');
                const infoEl = document.getElementById('admin-user-info');
                if (infoEl) {
                    infoEl.innerHTML =
                        (user.photoURL
                            ? `<img src="${user.photoURL}" style="width:22px;height:22px;border-radius:50%;object-fit:cover;">`
                            : `<i class="fas fa-user-circle"></i>`) +
                        `<span>${user.displayName || user.email}</span>`;
                }
                fetchList();
            } else {
                /* Чужой Google-аккаунт — немедленно выгоняем */
                firebase.auth().signOut().then(() => {
                    const infoEl = document.getElementById('denied-email-info');
                    if (infoEl) infoEl.textContent = user.email || user.uid;
                    showScreen('denied');
                });
            }
        });
    })
    .catch(err => {
        /* setPersistence упала (приватный режим Safari и т.п.) — graceful fallback */
        console.warn('setPersistence:', err);
        firebase.auth().onAuthStateChanged(user => {
            if (!user) { showScreen('login'); return; }
            const ok = ALLOWED_UIDS.includes(user.uid) && ALLOWED_EMAILS.includes(user.email);
            if (ok) {
                showScreen('admin');
                fetchList();
            } else {
                firebase.auth().signOut().then(() => {
                    const el = document.getElementById('denied-email-info');
                    if (el) el.textContent = user.email || user.uid;
                    showScreen('denied');
                });
            }
        });
    });

/* ════════════════════════════════════════════════════════════
   GOOGLE SIGN-IN
   ════════════════════════════════════════════════════════ */
async function signInWithGoogle() {
    const btn    = document.getElementById('google-sign-in-btn');
    const errEl  = document.getElementById('login-error');
    errEl.textContent = '';

    btn.disabled    = true;
    btn.innerHTML   = '<div class="check-spinner" style="width:20px;height:20px;border-width:2px;margin:0;"></div> Открываем Google...';

    try {
        const provider = new firebase.auth.GoogleAuthProvider();

        /*
         * Параметры провайдера:
         * - prompt: 'select_account' — всегда показывает выбор аккаунта,
         *   даже если в браузере уже залогинен один аккаунт.
         *   Это важно: без этого параметра Google автоматически
         *   войдёт с первым аккаунтом в браузере, минуя выбор.
         */
        provider.setCustomParameters({ prompt: 'select_account' });

        /*
         * signInWithPopup — открывает всплывающее окно Google.
         * onAuthStateChanged выше сам разберётся что делать после входа.
         */
        await firebase.auth().signInWithPopup(provider);

    } catch (e) {
        const msgs = {
            'auth/popup-closed-by-user':       'Окно входа закрыто. Попробуйте снова.',
            'auth/popup-blocked':              'Браузер заблокировал всплывающее окно. Разрешите popup для этого сайта.',
            'auth/cancelled-popup-request':    'Запрос отменён.',
            'auth/network-request-failed':     '🌐 Нет соединения с интернетом.',
            'auth/unauthorized-domain':        '⚠️ Домен не добавлен в Authorized domains. Инструкция в README.',
        };
        errEl.textContent = msgs[e.code] || ('Ошибка: ' + e.message);

        btn.disabled  = false;
        btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Войти через Google';
    }
}

/* ════════════════════════════════════════════════════════════
   ВЫХОД
   ════════════════════════════════════════════════════════ */
function signOut() {
    if (dbListenerRef) { dbListenerRef.off(); dbListenerRef = null; }
    firebase.auth().signOut();
    /* onAuthStateChanged автоматически вызовет showScreen('login') */
}

/* ════════════════════════════════════════════════════════════
   ПРЕВЬЮ ФОТО
   ════════════════════════════════════════════════════════ */
function showPreview(input) {
    if (!input.files?.[0]) return;
    const reader = new FileReader();
    reader.onload = e => {
        const img = document.getElementById('img-preview');
        img.src = e.target.result;
        img.style.display = 'block';
        document.getElementById('upload-label').style.display = 'none';
    };
    reader.readAsDataURL(input.files[0]);
}

/* ════════════════════════════════════════════════════════════
   СОХРАНИТЬ ТОВАР
   ════════════════════════════════════════════════════════ */
async function saveProduct() {
    /* Перепроверяем авторизацию перед каждой записью */
    const user = firebase.auth().currentUser;
    if (!user || !ALLOWED_UIDS.includes(user.uid)) {
        alert('Сессия истекла. Войдите снова.');
        showScreen('login');
        return;
    }

    if (!navigator.onLine) { alert('❌ Нет интернета!'); return; }

    const btn       = document.getElementById('add-btn');
    const fileInput = document.getElementById('p-file');
    const name      = document.getElementById('p-name').value.trim();
    const price     = parseInt(document.getElementById('p-price').value, 10);

    if (!name || !price || price <= 0) { alert('Заполните название и цену!'); return; }
    if (!editId && !fileInput.files[0]) { alert('Выберите фото!'); return; }

    btn.disabled    = true;
    btn.textContent = '⏳ Загружаем...';

    try {
        let imgUrl = null;

        /* 1. ImgBB */
        if (fileInput.files[0]) {
            const fd = new FormData();
            fd.append('image', fileInput.files[0]);
            const res  = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method:'POST', body:fd });
            const data = await res.json();
            if (!data.success) throw new Error('ImgBB: ' + (data.error?.message || 'ошибка загрузки'));
            imgUrl = data.data.url;
        }

        /* 2. Объект товара (структура не меняется — совместимость с БД) */
        const product = {
            name,
            price,
            desc:  document.getElementById('p-desc').value.trim()  || '',
            count: document.getElementById('p-count').value.trim() || '',
            cat:   document.getElementById('p-cat').value,
            type:  document.getElementById('p-type').value,
            badge: document.getElementById('product-badge').value,
        };

        /* Фото: новое если загрузили, иначе сохраняем старое */
        if (imgUrl)                 product.img = imgUrl;
        else if (editId && currentImgUrl) product.img = currentImgUrl;

        /* 3. Firebase */
        const ref = editId
            ? database.ref('products/' + editId)
            : database.ref('products').push();
        await ref.set(product);

        showToast(editId ? '✅ Обновлено!' : '✅ Добавлено!');
        resetForm();

    } catch (err) {
        console.error('saveProduct:', err);
        alert('⚠️ Ошибка: ' + err.message);
    } finally {
        btn.disabled    = false;
        btn.textContent = editId ? 'Сохранить изменения' : 'Опубликовать';
    }
}

/* ════════════════════════════════════════════════════════════
   СПИСОК ТОВАРОВ (real-time)
   ════════════════════════════════════════════════════════ */
function fetchList() {
    if (dbListenerRef) { dbListenerRef.off(); }
    dbListenerRef = database.ref('products');

    dbListenerRef.on('value', snap => {
        const container = document.getElementById('product-list');
        if (!container) return;

        const q    = (document.getElementById('admin-search')?.value || '').toLowerCase();
        const catF = document.getElementById('admin-filter-cat')?.value || 'all';
        const data = snap.val();

        if (!data) { container.innerHTML = '<p class="admin-empty">Список пуст</p>'; return; }

        const keys = Object.keys(data).reverse().filter(id => {
            const p      = data[id];
            const nameOk = (p.name || '').toLowerCase().includes(q);
            const catOk  = catF === 'all' || p.cat === catF || p.category === catF;
            return nameOk && catOk;
        });

        if (!keys.length) { container.innerHTML = '<p class="admin-empty">Ничего не найдено</p>'; return; }

        container.innerHTML = keys.map(id => {
            const p      = data[id];
            const isStop = p.available === false;
            return `
            <div class="list-item">
                <img class="list-thumb" src="${p.img || ''}" alt=""
                     onerror="this.style.display='none'">
                <div class="list-info">
                    <span class="list-name ${isStop ? 'unavail' : ''}">${escHtml(p.name)}</span>
                    <span class="list-meta">${p.price} ₸ · ${p.cat || p.category || '—'}</span>
                </div>
                <div class="list-controls">
                    <button class="list-btn btn-edit"   onclick="editItem('${id}')">Ред.</button>
                    <button class="list-btn ${isStop ? 'btn-toggle-ret':'btn-toggle-stop'}"
                            onclick="toggleStock('${id}',${isStop})">
                        ${isStop ? 'Вернуть':'Стоп'}
                    </button>
                    <button class="list-btn btn-delete" onclick="deleteItem('${id}')">✕</button>
                </div>
            </div>`;
        }).join('');
    });
}

/* ════════════════════════════════════════════════════════════
   РЕДАКТИРОВАТЬ
   ════════════════════════════════════════════════════════ */
function editItem(id) {
    database.ref('products/' + id).once('value', snap => {
        const p = snap.val(); if (!p) return;
        editId        = id;
        currentImgUrl = p.img || null;

        setVal('p-name',        p.name  || '');
        setVal('p-price',       p.price || '');
        setVal('p-desc',        p.desc  || '');
        setVal('p-count',       p.count || '');
        setVal('p-cat',         p.cat || p.category || 'first');
        setVal('p-type',        p.type  || '');
        setVal('product-badge', p.badge || '');

        document.getElementById('form-title').textContent   = '✏️ Редактирование';
        document.getElementById('add-btn').textContent      = 'Сохранить изменения';
        document.getElementById('cancel-btn').style.display = 'block';
        window.scrollTo({ top:0, behavior:'smooth' });
    });
}

/* ════════════════════════════════════════════════════════════
   СБРОС ФОРМЫ
   ════════════════════════════════════════════════════════ */
function resetForm() {
    editId = null; currentImgUrl = null;
    ['p-name','p-price','p-desc','p-count'].forEach(id => setVal(id, ''));
    setVal('p-cat','first'); setVal('p-type',''); setVal('product-badge','');
    const fi = document.getElementById('p-file');
    const pr = document.getElementById('img-preview');
    const lb = document.getElementById('upload-label');
    if (fi) fi.value = '';
    if (pr) { pr.style.display='none'; pr.src=''; }
    if (lb) lb.style.display = 'block';
    document.getElementById('form-title').textContent       = '➕ Новое блюдо';
    document.getElementById('add-btn').textContent          = 'Опубликовать';
    document.getElementById('cancel-btn').style.display     = 'none';
}

/* ════════════════════════════════════════════════════════════
   ПЕРЕКЛЮЧИТЬ НАЛИЧИЕ / УДАЛИТЬ
   ════════════════════════════════════════════════════════ */
function toggleStock(id, isCurrentlyUnavailable) {
    database.ref('products/' + id).update({ available: isCurrentlyUnavailable ? true : false });
}
function deleteItem(id) {
    if (confirm('Удалить это блюдо навсегда? Отменить нельзя.'))
        database.ref('products/' + id).remove();
}

/* ════════════════════════════════════════════════════════════
   УТИЛИТЫ
   ════════════════════════════════════════════════════════ */
function setVal(id, v) { const el = document.getElementById(id); if (el) el.value = v; }

function escHtml(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
    const t = document.getElementById('admin-toast');
    if (!t) return;
    t.textContent = msg;
    t.style.opacity = '1';
    t.style.transform = 'translateX(-50%) translateY(0)';
    setTimeout(() => {
        t.style.opacity = '0';
        t.style.transform = 'translateX(-50%) translateY(20px)';
    }, 2800);
}
</script>
